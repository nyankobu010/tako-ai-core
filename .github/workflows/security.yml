name: Security

on:
  schedule:
    - cron: '17 6 * * *'   # daily 06:17 UTC
  workflow_dispatch:

permissions:
  contents: read
  issues: write

jobs:
  cargo-audit:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      # cargo-audit picks up `.cargo/audit.toml` from the workspace root
      # automatically, so the documented ignores live there (versioned in
      # the repo, not in YAML).
      - name: cargo audit
        run: |
          cargo install --locked cargo-audit
          cargo audit
