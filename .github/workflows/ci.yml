name: CI

on:
  pull_request:
  push:
    branches: [main]

permissions:
  contents: read

env:
  CARGO_TERM_COLOR: always
  RUST_BACKTRACE: 1
  CARGO_INCREMENTAL: 0

jobs:
  rust:
    name: Rust ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
    steps:
      - uses: actions/checkout@v5
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy
      - uses: Swatinem/rust-cache@v2
      - name: cargo fmt
        run: cargo fmt --all -- --check
      - name: cargo clippy
        run: cargo clippy --workspace --all-features -- -D warnings
      - name: cargo test
        run: cargo test --workspace --all-features

  python:
    name: Python ${{ matrix.python }} on ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    needs: [rust]
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
        python: ["3.10", "3.11", "3.12", "3.13"]
    steps:
      - uses: actions/checkout@v5
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - uses: actions/setup-python@v6
        with:
          python-version: ${{ matrix.python }}
      # `maturin develop` requires a virtualenv (it refuses to install into
      # a system Python). Create `.venv`, then export `VIRTUAL_ENV` and
      # prepend the venv's bin/Scripts dir to `PATH` so every subsequent
      # step (`pip`, `maturin`, `ruff`, `mypy`, `pytest`) runs against
      # the venv's interpreter on Linux, macOS, and Windows alike.
      - name: setup venv
        shell: bash
        run: |
          python -m venv .venv
          if [ -d .venv/bin ]; then
            VENV_BIN="$(pwd)/.venv/bin"
          else
            VENV_BIN="$(pwd)/.venv/Scripts"
          fi
          echo "$VENV_BIN" >> "$GITHUB_PATH"
          echo "VIRTUAL_ENV=$(pwd)/.venv" >> "$GITHUB_ENV"
      - name: install deps
        run: |
          python -m pip install --upgrade pip
          pip install maturin pytest pytest-asyncio ruff mypy hypothesis
      - name: maturin develop
        run: maturin develop --release
      - name: ruff
        run: |
          ruff check python/ tests/python/ examples/
          ruff format --check python/ tests/python/ examples/
      - name: mypy
        run: mypy python/tako
      - name: pytest
        run: pytest -q tests/python

  audit:
    name: Security audit
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      # cargo-audit picks up `.cargo/audit.toml` from the workspace root
      # automatically, so the documented ignores live there (versioned in
      # the repo, not in YAML).
      - name: cargo audit
        run: |
          cargo install --locked cargo-audit
          cargo audit
      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"
      - name: pip-audit
        run: |
          python -m pip install pip-audit
          pip-audit -r <(python - <<'PY'
          import tomllib, pathlib
          data = tomllib.loads(pathlib.Path("pyproject.toml").read_text())
          for dep in data["project"].get("dependencies", []):
              print(dep)
          PY
          ) || true
