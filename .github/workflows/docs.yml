name: Build docs

on:
  push:
    branches: [main]
    paths:
      - 'docs/**'
      - 'python/tako/**'
      - '.github/workflows/docs.yml'
  workflow_dispatch:

permissions:
  contents: read

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-python@v6
        with:
          python-version: "3.11"
          cache: pip

      - name: Install docs deps
        run: |
          python -m pip install --upgrade pip
          pip install \
            mkdocs-material \
            "mkdocstrings[python]"

      - name: Build site
        run: mkdocs build --strict
