name: Deploy docs

on:
  push:
    branches: [main]
    paths:
      - 'docs/**'
      - 'python/tako/**'
      - '.github/workflows/docs.yml'
  workflow_dispatch:

# Required for actions/deploy-pages.
permissions:
  contents: read
  pages: write
  id-token: write

# Single in-flight deploy at a time; queue but don't cancel an in-flight deploy.
concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-python@v6
        with:
          python-version: "3.11"
          cache: pip

      - name: Install docs deps
        run: |
          python -m pip install --upgrade pip
          pip install \
            mkdocs-material \
            "mkdocstrings[python]"

      - name: Build site
        run: mkdocs build --strict

      - uses: actions/upload-pages-artifact@v5
        with:
          path: site

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
