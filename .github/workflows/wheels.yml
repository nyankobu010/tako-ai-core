name: Build wheels

on:
  push:
    tags: ['v*']
  workflow_dispatch:

permissions:
  id-token: write   # PyPI Trusted Publishing
  contents: read

jobs:
  build:
    name: Build ${{ matrix.target }} on ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - { os: ubuntu-latest,  target: x86_64-unknown-linux-gnu,    manylinux: 2_28 }
          - { os: ubuntu-latest,  target: aarch64-unknown-linux-gnu,   manylinux: 2_28 }
          - { os: ubuntu-latest,  target: x86_64-unknown-linux-musl,   manylinux: musllinux_1_2 }
          - { os: ubuntu-latest,  target: aarch64-unknown-linux-musl,  manylinux: musllinux_1_2 }
          - { os: macos-latest,   target: universal2-apple-darwin }
          - { os: windows-latest, target: x86_64-pc-windows-msvc }
          # aarch64-pc-windows-msvc is a cross-compile from the x64 host.
          # `--interpreter python` forces maturin to invoke the host's
          # Python (resolved via PATH to setup-python's install) to query
          # `sys.version_info` instead of falling back to name-based
          # discovery, which skips bare `python.exe` with the warning
          # "could not determine version from interpreter name". The wheel
          # is abi3 so any host interpreter is fine for version metadata;
          # PyO3's abi3 path generates the aarch64 import lib without
          # needing a target-arch interpreter.
          - { os: windows-latest, target: aarch64-pc-windows-msvc, interpreter_arg: "--interpreter python" }
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"
      # Phase 50.B — released wheels bake in every pure-Rust feature
      # (auth-*, sigstore*, ws, grpc, redis) so `pip install tako`
      # gives a wheel where `JwtAuth` / `OidcAuth` / `VaultAuth` /
      # mTLS rotation / sigstore verification / Redis budget backend
      # are all functional out of the box. The only feature kept
      # opt-in is `onnx`, because ONNX Runtime has system-level
      # dynamic-library deps that would require per-platform
      # bundling. Operators who need `OnnxRouter` build from source.
      #
      # Features are passed comma-separated (not space-separated inside a
      # quoted string) so the action's argv parser routes the entire list
      # to cargo's `--features` flag. The previous space-separated form
      # caused all but the first feature to leak past `--` and be passed
      # to rustc as positional input filenames.
      - uses: PyO3/maturin-action@v1
        with:
          target: ${{ matrix.target }}
          manylinux: ${{ matrix.manylinux || '' }}
          args: >-
            --release --locked --compatibility pypi
            --features auth-jwt,auth-oidc,auth-vault,auth-mtls-fs-watch,auth-mtls-identity-provider,sigstore,sigstore-protobuf,ws,grpc,redis
            ${{ matrix.interpreter_arg || '' }}
      - uses: actions/upload-artifact@v5
        with:
          name: wheels-${{ matrix.target }}
          path: target/wheels/*.whl

  sdist:
    name: Build sdist
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: PyO3/maturin-action@v1
        with:
          command: sdist
          args: --out target/wheels
      - uses: actions/upload-artifact@v5
        with:
          name: sdist
          path: target/wheels/*.tar.gz

  publish:
    name: Publish to PyPI
    needs: [build, sdist]
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/v')
    environment: pypi
    steps:
      - uses: actions/download-artifact@v6
        with:
          path: dist/
          merge-multiple: true
      - uses: pypa/gh-action-pypi-publish@release/v1
        with:
          packages-dir: dist/
