name: Build wheels

on:
  push:
    tags: ['v*']
  workflow_dispatch:

permissions:
  id-token: write   # PyPI Trusted Publishing
  contents: read

jobs:
  build:
    name: Build ${{ matrix.target }} on ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - { os: ubuntu-latest,  target: x86_64-unknown-linux-gnu,    manylinux: 2_28 }
          - { os: ubuntu-latest,  target: aarch64-unknown-linux-gnu,   manylinux: 2_28 }
          - { os: ubuntu-latest,  target: x86_64-unknown-linux-musl,   manylinux: musllinux_1_2 }
          - { os: ubuntu-latest,  target: aarch64-unknown-linux-musl,  manylinux: musllinux_1_2 }
          - { os: macos-latest,   target: universal2-apple-darwin }
          - { os: windows-latest, target: x86_64-pc-windows-msvc }
          - { os: windows-latest, target: aarch64-pc-windows-msvc }
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"
      - uses: PyO3/maturin-action@v2
        with:
          target: ${{ matrix.target }}
          manylinux: ${{ matrix.manylinux || '' }}
          args: --release --locked --compatibility pypi
      - uses: actions/upload-artifact@v5
        with:
          name: wheels-${{ matrix.target }}
          path: target/wheels/*.whl

  sdist:
    name: Build sdist
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: PyO3/maturin-action@v2
        with:
          command: sdist
          args: --out target/wheels
      - uses: actions/upload-artifact@v5
        with:
          name: sdist
          path: target/wheels/*.tar.gz

  publish:
    name: Publish to PyPI
    needs: [build, sdist]
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/v')
    environment: pypi
    steps:
      - uses: actions/download-artifact@v6
        with:
          path: dist/
          merge-multiple: true
      - uses: pypa/gh-action-pypi-publish@release/v1
        with:
          packages-dir: dist/
